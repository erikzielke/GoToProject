# This is a basic workflow to help you get started with Actions

name: CI
permissions:
  contents: read

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check code formatting
        run: ./gradlew spotlessCheck

      - name: Run Detekt analysis
        run: ./gradlew detektAll

      - name: Build
        run: ./gradlew build

      - name: Generate Kover reports
        run: ./gradlew koverBinaryReport koverHtmlReport koverXmlReport

      # Upload JUnit test reports as artifacts
      - name: Upload JUnit test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-test-reports
          path: build/reports/tests/test
          retention-days: 7

      # Upload Kover coverage reports as artifacts
      - name: Upload Kover coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: kover-coverage-reports
          path: build/reports/kover
          retention-days: 7

      # Upload Detekt static analysis reports as artifacts
      - name: Upload Detekt static analysis reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: detekt-analysis-reports
          path: build/reports/detekt
          retention-days: 7
